name: '📦 Terraform Plan'
 
on:
  workflow_call:
    inputs:
      environment:
        description: '🌍 Select the environment: "dev" "pvi" "hmg" "prd"'
        required: true
        type: string
        default: 'dev'
      terraform_directory:
        description: '📂 Directory containing the Terraform project'
        required: false
        type: string
        default: '.'
      role-to-assume:
        description: '🔐 Type the AWS Role to assume (ARN)'
        required: true
        type: string      
permissions:
  id-token: write
  contents: read
 
env:
  TF_VAR_role_to_assume: ${{ inputs.role-to-assume }}
  TF_VAR_USR_RDS_AD_SQL_PASS: ${{ secrets.USR_RDS_AD_SQL_PASS}}
  TF_VAR_REDISCLOUD_ACCESS_KEY: ${{ secrets.REDISCLOUD_ACCESS_KEY}}
  TF_VAR_REDISCLOUD_SECRET_KEY: ${{ secrets.REDISCLOUD_SECRET_KEY}}
 
jobs:
  prepare:
    name: '🧰 Setup & Backend'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
 
    outputs:
      terraform_directory: ${{ steps.set-env.outputs.terraform_directory }}
      backend_bucket: ${{ steps.set-env.outputs.backend_bucket }}
      dynamodb_table: ${{ steps.set-env.outputs.dynamodb_table }}
      backend_region: ${{ steps.set-env.outputs.backend_region }}
      environment: ${{ steps.set-env.outputs.environment }}
 
    steps:
      - name: 🔐 Validate HMG execution permission (devops OR arquitetura_tech)
        if: inputs.environment == 'hmg'
        env:
          ORG: crefitech
          TEAMS: "devops arquitetura_tech"
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.UPDATE_SECRETS_MANAGER_TOKEN }}
        run: |
          set -euo pipefail
          echo "🔍 Validando acesso do usuário: $ACTOR"
          echo "Times permitidos: $TEAMS"
          authorized=false
          for TEAM in $TEAMS; do
            echo "➡️ Verificando time: $TEAM"
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/$ORG/teams/$TEAM/memberships/$ACTOR)
            if [ "$status" == "200" ]; then
              echo "✅ Usuário pertence ao time: $TEAM"
              authorized=true
              break
            fi
          done
          if [ "$authorized" != "true" ]; then
            echo "❌ Acesso negado! Usuário não pertence a nenhum dos times permitidos"
            exit 1
          fi
          echo "✅ Acesso autorizado"
      - name: 🔐 Validate PRD execution permission (devops OR arquitetura_tech)
        if: inputs.environment == 'prd'
        env:
          ORG: crefitech
          TEAMS: "datacenter arquitetura_tech devops"
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.UPDATE_SECRETS_MANAGER_TOKEN }}
        run: |
          set -euo pipefail
          echo "🔍 Validando acesso do usuário: $ACTOR"
          echo "Times permitidos: $TEAMS"
          authorized=false
          for TEAM in $TEAMS; do
            echo "➡️ Verificando time: $TEAM"
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/orgs/$ORG/teams/$TEAM/memberships/$ACTOR)
            if [ "$status" == "200" ]; then
              echo "✅ Usuário pertence ao time: $TEAM"
              authorized=true
              break
            fi
          done
          if [ "$authorized" != "true" ]; then
            echo "❌ Acesso negado! Usuário não pertence a nenhum dos times permitidos"
            exit 1
          fi
          echo "✅ Acesso autorizado"
 
      - name: 🧹 Clean Checkov Results Directory
        run: |
          if [ -d "checkov-results" ]; then
            sudo rm -rf checkov-results
          fi
        shell: bash
 
      - name: 🛠️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.14'
          terraform_wrapper: false
 
      - name: 🔑 Configure AWS Credentials
        id: assume-role 
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: sa-east-1      
        continue-on-error: false        
 
      - name: 🔑 Validate AWS Login
        run: |
          echo "Role: ${{ secrets[format('{0}_{1}','AWS_ROLE_PLATFORM_SESSION_NAME', inputs.environment)] }}"
          aws sts get-caller-identity   
 
      - name: 🌐 Set Backend Configuration Variables
        id: set-env
        run: |
          if [ "${{ inputs.environment }}" == "dev" ]; then
            backend_bucket="s3-aws-plataform-terraform-dev"
            backend_region="sa-east-1"
          elif [ "${{ inputs.environment }}" == "int" ]; then
            backend_bucket="s3-aws-plataform-terraform-int"
            backend_region="sa-east-1"
          elif [ "${{ inputs.environment }}" == "hmg" ]; then
            backend_bucket="s3-aws-plataform-terraform-hmg"
            backend_region="sa-east-1"
          elif [ "${{ inputs.environment }}" == "prd" ]; then
            backend_bucket="s3-aws-plataform-terraform-prd"
            backend_region="sa-east-1"
          else
            echo "❌ Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
 
          echo "AWS_BACKEND_BUCKET=$backend_bucket" >> $GITHUB_ENV
          echo "AWS_BACKEND_REGION=$backend_region" >> $GITHUB_ENV
          echo "AWS_BACKEND_ENCRYPT=true" >> $GITHUB_ENV
          echo "terraform_directory=${{ inputs.terraform_directory }}" >> $GITHUB_OUTPUT
          echo "backend_bucket=$backend_bucket" >> $GITHUB_OUTPUT
          echo "backend_region=$backend_region" >> $GITHUB_OUTPUT
          echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
 
      - name: 🗄️ Generate backend.conf
        id: backend
        run: |
          cat > backend.conf <<EOF
          bucket         = "${AWS_BACKEND_BUCKET}"
          key            = "${{ github.repository }}-${{ inputs.environment }}.tfstate"
          region         = "${AWS_BACKEND_REGION}"
          encrypt        = true
          use_lockfile   = true
          EOF
          echo "✅ backend.conf generated:"
          cat backend.conf
        working-directory: ${{ inputs.terraform_directory }}
      - name: 📤 Upload backend.conf
        uses: actions/upload-artifact@v4
        with:
          name: backend-config
          path: ${{ inputs.terraform_directory }}/backend.conf
 
  validate:
    name: '🔍 Terraform Validate'
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ inputs.environment }}
 
    steps:
      - name: 🧹 Clean Checkov Results Directory
        run: |
          if [ -d "checkov-results" ]; then
            sudo rm -rf checkov-results
          fi
        shell: bash
 
      - name: 🧹 Cleanup stale Terraform temp directories
        shell: bash
        run: |
          sudo find /tmp -maxdepth 1 -type d -name 'tfdata-*' -mtime +2 -exec rm -rf {} + || true
      - name: 🛠️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: 📥 Download backend.conf
        uses: actions/download-artifact@v4
        with:
          name: backend-config
          path: ${{ inputs.terraform_directory }}
 
      - name: 🔎 Validate backend.conf
        shell: bash
        run: |
          set -euo pipefail
          test -f backend.conf
          test -s backend.conf
          grep -Eq '^[[:space:]]*bucket[[:space:]]*=[[:space:]]*"[^"]+"' backend.conf
          grep -Eq '^[[:space:]]*key[[:space:]]*=[[:space:]]*"[^"]+"' backend.conf
          echo "✅ backend.conf is present with bucket/key"
          cat backend.conf
        working-directory: ${{ inputs.terraform_directory }}
 
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.14'
          terraform_wrapper: false
      - name: 🔑 Configure AWS Credentials
        id: assume-role 
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: sa-east-1

      - name: 🧩 Install Git
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: 🔧 Configure git to use GitHub token
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
        run: |
          git config --global url."https://x-access-token:${TERRAFORM_PAT}@github.com/crefitech".insteadOf "https://github.com/crefitech"
 
      - name: 🔐 Configure Git authentication for Terraform modules
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          git config --global --unset-all credential.helper || true
          git config --global credential.helper store
          echo "https://x-access-token:${TERRAFORM_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${TERRAFORM_PAT}@github.com/crefitech/".insteadOf "https://github.com/crefitech/"
          echo -e "machine github.com\nlogin x-access-token\npassword $TERRAFORM_PAT" > ~/.netrc
          chmod 600 ~/.netrc      

 
      - name: Clean terraform cache- name: Clean |
          rm -rf .terraform
          rm -f .terraform.lock.h

      - name: 🛠️ Terraform Init
        run: |
          terraform init -reconfigure -backend-config=backend.conf -force-copy && terraform providers
        working-directory: ${{ inputs.terraform_directory }}
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          AWS_BACKEND_BUCKET: ${{ needs.prepare.outputs.backend_bucket }}
          AWS_BACKEND_REGION: ${{ needs.prepare.outputs.backend_region }}          
      - name: 🧹 Terraform Format
        run: terraform fmt -recursive && terraform fmt -check -diff -write=true
        working-directory: ${{ inputs.terraform_directory }}
      - name: ✅ Terraform Validate
        run: terraform validate
        working-directory: ${{ inputs.terraform_directory }}
 
      - name: 🧹 Cleanup current Terraform temp directory
        if: always()
        shell: bash
        run: |
          if [[ -n "${TF_DATA_DIR:-}" && "${TF_DATA_DIR}" == /tmp/tfdata-* ]]; then
            sudo rm -rf "${TF_DATA_DIR}" || true
            echo "✅ Removed TF_DATA_DIR: ${TF_DATA_DIR}"
          else
            echo "ℹ️ TF_DATA_DIR not set for this job; nothing to clean"
          fi
 
  plan:
    name: '📦 Terraform Plan'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [prepare, validate]
    steps:    
      - name: 🧹 Clean Checkov Results Directory
        run: |
          if [ -d "checkov-results" ]; then
            sudo rm -rf checkov-results
          fi
        shell: bash
 
      - name: 🧹 Cleanup stale Terraform temp directories
        shell: bash
        run: |
          sudo find /tmp -maxdepth 1 -type d -name 'tfdata-*' -mtime +2 -exec rm -rf {} + || true
 
      - name: 🛠️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: 📥 Download backend.conf
        uses: actions/download-artifact@v4
        with:
          name: backend-config
          path: ${{ inputs.terraform_directory }}
 
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.14'
          terraform_wrapper: false
      - name: 🔑 Configure AWS Credentials
        id: assume-role 
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: sa-east-1
      - name: 🔧 Configure git to use GitHub token
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
        run: |
          git config --global url."https://x-access-token:${TERRAFORM_PAT}@github.com/crefitech".insteadOf "https://github.com/crefitech"
 
      - name: 🔐 Configure Git authentication for Terraform modules
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          git config --global --unset-all credential.helper || true
          git config --global credential.helper store
          echo "https://x-access-token:${TERRAFORM_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${TERRAFORM_PAT}@github.com/crefitech/".insteadOf "https://github.com/crefitech/"
          echo -e "machine github.com\nlogin x-access-token\npassword $TERRAFORM_PAT" > ~/.netrc
          chmod 600 ~/.netrc
      - name: 🔍 Verify AWS Account Identity
        run: |
          echo "🔎 Checking current AWS identity..."
          aws sts get-caller-identity
      - name: 🛠️ Terraform Init
        run: terraform init -backend-config=backend.conf
        working-directory: ${{ inputs.terraform_directory }}
        env:
          TERRAFORM_PAT: ${{ secrets.TERRAFORM_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          AWS_BACKEND_BUCKET: ${{ needs.prepare.outputs.backend_bucket }}
          AWS_BACKEND_REGION: ${{ needs.prepare.outputs.backend_region }}      
 
      - name: 📜 Terraform Plan
        id: tf-plan
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -out=tfplan -var-file="environments/${{ inputs.environment }}/${{ inputs.environment }}.tfvars" || export exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [ $exitcode -eq 1 ]; then
            echo ❌ Terraform Plan Failed!
            exit 1
          else 
            exit 0
          fi
        working-directory: ${{ inputs.terraform_directory }}
        env:
          TF_VAR_github_token: ${{ secrets.TERRAFORM_PAT }}
          TF_VAR_secrets_content: ${{ secrets.AWS_SECRETMANAGER_SECRETS }}
 
      - name: 📤 Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.terraform_directory }}/tfplan
 
      - name: 📝 Create Plan Summary
        id: plan-summary
        run: |
          cd ${{ inputs.terraform_directory }}
          terraform init -no-color -input=false
          TERRAFORM_PLAN=$(terraform show -no-color tfplan)
          echo "## Terraform Plan Output" > summary.md
          echo "<details><summary>Click to expand</summary>" >> summary.md
          echo "" >> summary.md
          echo '```terraform' >> summary.md
          echo "$TERRAFORM_PLAN" >> summary.md
          echo '```' >> summary.md
          echo "</details>" >> summary.md
          cat summary.md >> $GITHUB_STEP_SUMMARY
 
      - name: 📢 Publish Summary
        run: echo "${{ steps.plan-summary.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
 
      - name: 🧹 Cleanup current Terraform temp directory
        if: always()
        shell: bash
        run: |
          if [[ -n "${TF_DATA_DIR:-}" && "${TF_DATA_DIR}" == /tmp/tfdata-* ]]; then
            sudo rm -rf "${TF_DATA_DIR}" || true
            echo "✅ Removed TF_DATA_DIR: ${TF_DATA_DIR}"
          else
            echo "ℹ️ TF_DATA_DIR not set for this job; nothing to clean"
          fi
